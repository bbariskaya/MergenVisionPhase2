artifacts:
  - name: retinaface_r50_dynamic
    role: detector
    source:
      project: insightface/retinaface
      source_repository: MergenVisionDemo
      source_artifact_sha256:
        onnx: fd8a87a6f2837d425604e0f88efca91e661947dbc3707f54da53ec27a8dc9a8a
        engine: 8d1cc252042b1d80e36b9ea1d5b9e7302e81b747cb73701b06fcd1fee34ee68e
      source_paths:
        onnx: artifacts/models/retinaface_r50_dynamic.onnx
        engine: artifacts/engines/retinaface_r50_dynamic.engine
      source_ref: local_read_only_reference
      export_script: unknown
      export_commit: unknown
      onnx_url: null
    files:
      - path: models/retinaface_r50_dynamic.onnx
        sha256: fd8a87a6f2837d425604e0f88efca91e661947dbc3707f54da53ec27a8dc9a8a
        rejected_for_phase2_runtime: false
      - path: engines/retinaface_r50_dynamic.engine
        sha256: 8d1cc252042b1d80e36b9ea1d5b9e7302e81b747cb73701b06fcd1fee34ee68e
        rejected_for_phase2_runtime: false
    tensor_contract:
      input:
        name: input
        shape: [-1, 3, 640, 640]
        dtype: float32
      outputs:
        - name: loc
          shape: [-1, 16800, 4]
          dtype: float32
        - name: conf
          shape: [-1, 16800, 2]
          dtype: float32
        - name: landms
          shape: [-1, 16800, 10]
          dtype: float32
    dynamic_batch_profile:
      input:
        min: [1, 3, 640, 640]
        opt: [64, 3, 640, 640]
        max: [256, 3, 640, 640]
    runtime_batch_strategy:
      initial_tracker_gate: 1
      benchmark_gate: [1, 4, 8, 16]
      note: opt profile is the engine optimization hint; runtime batch-size starts at 1 for tracker correctness.
    preprocess:
      resize: [640, 640]
      resize_policy: squish
      padding: none
      color_format: BGR
      mean: [104.0, 117.0, 123.0]
      scale: 1.0
      layout: NCHW
    postprocess:
      custom_parser_required: true
      confidence_class_index: 1
      confidence_threshold: 0.5
      nms_threshold: 0.4
      nms_implementation: native_cpp_initially
      priors:
        steps: [8, 16, 32]
        min_sizes: [[16, 32], [64, 128], [256, 512]]
      variance: [0.1, 0.2]
      reverse_mapping:
        note: Decoder output is normalized to [0,1] in 640-space; multiply x by original_width and y by original_height to recover original-resolution coordinates.
        scale_x: original_width
        scale_y: original_height
    build_env:
      trt_version: 10.3.0
      cuda_version: 12.4.1
      gpu: Quadro RTX 8000
      compute_capability: "7.5"
      precision: FP16
    provenance_status: inherited_local_artifact_unverified
    license_status: unverified
    commercial_gate: blocked_pending_provenance
    parity_tests: pending

